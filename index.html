<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reloj + Alarma + Cronómetro + Temporizador</title>

    <!-- Fuente digital -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* =============================================
                     RESET & GENERAL
                     ============================================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
        color: #ffffff;
        transition: background 0.6s ease;
        padding: 1rem;
      }

      body.light-mode {
        background: linear-gradient(145deg, #e8ecf1 0%, #d5dbe6 50%, #c9d0dd 100%);
        color: #1a1a2e;
      }

      /* =============================================
                     TARJETA PRINCIPAL
                     ============================================= */
      .app-card {
        text-align: center;
        padding: 2rem 2.5rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.3),
          inset 0 1px 1px rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s ease;
        max-width: 550px;
        width: 100%;
      }

      body.light-mode .app-card {
        background: rgba(255, 255, 255, 0.7);
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.1),
          inset 0 1px 1px rgba(255, 255, 255, 0.8);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .app-title {
        font-size: 1.3rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 1rem;
      }

      /* =============================================
                     NAVEGACIÓN (Tabs)
                     ============================================= */
      .tabs {
        display: flex;
        gap: 0.3rem;
        justify-content: center;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 0.8rem;
        flex-wrap: wrap;
      }

      body.light-mode .tabs {
        border-bottom-color: rgba(0, 0, 0, 0.1);
      }

      .tab-btn {
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.45);
        padding: 0.5rem 1.2rem;
        border-radius: 30px;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.25s ease;
        font-weight: 500;
        letter-spacing: 0.03em;
      }

      .tab-btn:hover {
        color: rgba(255, 255, 255, 0.8);
        background: rgba(255, 255, 255, 0.06);
      }

      .tab-btn.active {
        color: #00ffc3;
        background: rgba(0, 255, 195, 0.1);
        box-shadow: 0 0 10px rgba(0, 255, 195, 0.08);
      }

      body.light-mode .tab-btn {
        color: rgba(0, 0, 0, 0.4);
      }

      body.light-mode .tab-btn:hover {
        color: rgba(0, 0, 0, 0.7);
        background: rgba(0, 0, 0, 0.05);
      }

      body.light-mode .tab-btn.active {
        color: #0d7377;
        background: rgba(13, 115, 119, 0.1);
      }

      /* =============================================
                     PANELES (vistas)
                     ============================================= */
      .panel {
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .panel.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* =============================================
                     DISPLAY DIGITAL (compartido)
                     ============================================= */
      .digital-display {
        font-family: 'Orbitron', monospace;
        font-size: 3.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        line-height: 1.2;
        color: #00ffc3;
        text-shadow:
          0 0 10px rgba(0, 255, 195, 0.3),
          0 0 30px rgba(0, 255, 195, 0.1);
        transition: color 0.3s ease, text-shadow 0.3s ease;
        user-select: none;
        word-break: break-all;
      }

      body.light-mode .digital-display {
        color: #0d7377;
        text-shadow:
          0 0 8px rgba(13, 115, 119, 0.2),
          0 0 20px rgba(13, 115, 119, 0.08);
      }

      .digital-display .dim {
        font-size: 0.5em;
        opacity: 0.45;
        font-weight: 400;
      }

      /* ---- Alarm trigger flash ---- */
      .digital-display.flash {
        color: #ff4444 !important;
        text-shadow:
          0 0 20px rgba(255, 68, 68, 0.6),
          0 0 50px rgba(255, 68, 68, 0.3) !important;
      }

      body.light-mode .digital-display.flash {
        color: #d32f2f !important;
        text-shadow:
          0 0 15px rgba(211, 47, 47, 0.4),
          0 0 30px rgba(211, 47, 47, 0.15) !important;
      }

      /* ---- Info extra (fecha, zona, etc) ---- */
      .info-line {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        opacity: 0.5;
        letter-spacing: 0.03em;
        font-weight: 300;
        min-height: 1.3em;
      }

      /* =============================================
                     BOTONES DE CONTROL
                     ============================================= */
      .btn-group {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #ffffff;
        padding: 0.5rem 1.4rem;
        border-radius: 30px;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
        backdrop-filter: blur(6px);
        font-weight: 500;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.25);
        transform: scale(1.04);
      }

      .btn:active {
        transform: scale(0.95);
      }

      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none !important;
      }

      .btn.active {
        background: rgba(0, 255, 195, 0.15);
        border-color: #00ffc3;
        color: #00ffc3;
        box-shadow: 0 0 12px rgba(0, 255, 195, 0.12);
      }

      .btn.danger {
        border-color: rgba(255, 80, 80, 0.3);
        color: #ff6b6b;
      }

      .btn.danger:hover {
        background: rgba(255, 80, 80, 0.12);
        border-color: rgba(255, 80, 80, 0.5);
      }

      .btn.danger.active {
        background: rgba(255, 80, 80, 0.15);
        border-color: #ff6b6b;
        color: #ff6b6b;
        box-shadow: 0 0 12px rgba(255, 80, 80, 0.12);
      }

      body.light-mode .btn {
        background: rgba(0, 0, 0, 0.06);
        border-color: rgba(0, 0, 0, 0.1);
        color: #1a1a2e;
      }

      body.light-mode .btn:hover {
        background: rgba(0, 0, 0, 0.1);
      }

      body.light-mode .btn.active {
        background: rgba(13, 115, 119, 0.1);
        border-color: #0d7377;
        color: #0d7377;
      }

      body.light-mode .btn.danger {
        border-color: rgba(211, 47, 47, 0.3);
        color: #d32f2f;
      }

      body.light-mode .btn.danger:hover {
        background: rgba(211, 47, 47, 0.08);
      }

      body.light-mode .btn.danger.active {
        background: rgba(211, 47, 47, 0.1);
        border-color: #d32f2f;
        color: #d32f2f;
      }

      /* =============================================
                     ALARMA - SELECTORES
                     ============================================= */
      .alarm-pickers {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.6rem;
      }

      .alarm-pickers select {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
        font-size: 1.8rem;
        font-family: 'Orbitron', monospace;
        padding: 0.4rem 0.3rem;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        width: 80px;
        transition: border-color 0.2s;
      }

      .alarm-pickers select:focus {
        outline: none;
        border-color: #00ffc3;
      }

      .alarm-pickers select option {
        background: #1a1a2e;
        color: #fff;
      }

      body.light-mode .alarm-pickers select {
        background: rgba(0, 0, 0, 0.06);
        border-color: rgba(0, 0, 0, 0.15);
        color: #1a1a2e;
      }

      body.light-mode .alarm-pickers select option {
        background: #e8ecf1;
        color: #1a1a2e;
      }

      .alarm-pickers span {
        font-size: 1.8rem;
        font-family: 'Orbitron', monospace;
        opacity: 0.4;
      }

      .alarm-status {
        font-size: 0.9rem;
        margin-top: 0.3rem;
        opacity: 0.6;
        min-height: 1.3em;
      }

      .alarm-status.active-alarm {
        color: #ff6b6b;
        opacity: 1;
      }

      /* =============================================
                     TEMPORIZADOR - SELECTORES
                     ============================================= */
      .timer-pickers {
        display: flex;
        gap: 0.4rem;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
      }

      .timer-pickers select {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
        font-size: 1.8rem;
        font-family: 'Orbitron', monospace;
        padding: 0.4rem 0.3rem;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        width: 72px;
        transition: border-color 0.2s;
      }

      .timer-pickers select:focus {
        outline: none;
        border-color: #00ffc3;
      }

      .timer-pickers select option {
        background: #1a1a2e;
        color: #fff;
      }

      body.light-mode .timer-pickers select {
        background: rgba(0, 0, 0, 0.06);
        border-color: rgba(0, 0, 0, 0.15);
        color: #1a1a2e;
      }

      body.light-mode .timer-pickers select option {
        background: #e8ecf1;
        color: #1a1a2e;
      }

      .timer-pickers .sep {
        font-size: 1.8rem;
        font-family: 'Orbitron', monospace;
        opacity: 0.3;
      }

      .timer-pickers .lbl {
        font-size: 0.75rem;
        opacity: 0.4;
        text-align: center;
        display: block;
        margin-top: 0.15rem;
      }

      /* =============================================
                     CRONÓMETRO - VUELTAS
                     ============================================= */
      .laps-container {
        margin-top: 1rem;
        max-height: 130px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }

      .laps-container::-webkit-scrollbar {
        width: 4px;
      }

      .laps-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 4px;
      }

      .lap-item {
        display: flex;
        justify-content: space-between;
        padding: 0.3rem 0.5rem;
        font-size: 0.85rem;
        font-family: 'Orbitron', monospace;
        opacity: 0.6;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }

      .lap-item:first-child {
        opacity: 0.9;
      }

      body.light-mode .lap-item {
        border-bottom-color: rgba(0, 0, 0, 0.06);
      }

      .laps-empty {
        font-size: 0.8rem;
        opacity: 0.3;
        margin-top: 0.5rem;
      }

      /* =============================================
                     RESPONSIVE
                     ============================================= */
      @media (max-width: 520px) {
        .app-card {
          padding: 1.2rem 1rem;
          border-radius: 16px;
        }

        .app-title {
          font-size: 1rem;
          margin-bottom: 0.6rem;
        }

        .tab-btn {
          font-size: 0.75rem;
          padding: 0.4rem 0.8rem;
        }

        .digital-display {
          font-size: 2.4rem;
        }

        .alarm-pickers select,
        .timer-pickers select {
          font-size: 1.3rem;
          width: 58px;
          padding: 0.3rem 0.2rem;
        }

        .alarm-pickers span,
        .timer-pickers .sep {
          font-size: 1.3rem;
        }

        .btn {
          font-size: 0.78rem;
          padding: 0.4rem 1rem;
        }

        .info-line {
          font-size: 0.78rem;
        }
      }

      @media (max-width: 380px) {
        .digital-display {
          font-size: 1.8rem;
        }

        .alarm-pickers select,
        .timer-pickers select {
          font-size: 1.1rem;
          width: 48px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-card">
      <div class="app-title">⏱️ Multi Reloj</div>

      <!-- Tabs -->
      <nav class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="clock">🕐 Reloj</button>
        <button class="tab-btn" data-tab="alarm">🔔 Alarma</button>
        <button class="tab-btn" data-tab="stopwatch">⏱️ Crono</button>
        <button class="tab-btn" data-tab="timer">⏳ Temp.</button>
      </nav>

      <!-- =========================================
      PANEL: RELOJ
      ========================================= -->
      <div class="panel active" id="panel-clock">
        <div id="clockDisplay" class="digital-display">00:00:00</div>
        <div class="info-line" id="clockGreeting"></div>
        <div class="info-line" id="clockDate"></div>
        <div class="info-line" id="clockTimezone"></div>

        <div class="btn-group">
          <button class="btn active" id="btnFormat24h">24h</button>
          <button class="btn active" id="btnShowSeconds">Segundos</button>
          <button class="btn" id="btnTheme">🌙 Tema</button>
        </div>
      </div>

      <!-- =========================================
      PANEL: ALARMA
      ========================================= -->
      <div class="panel" id="panel-alarm">
        <div class="alarm-pickers">
          <div>
            <select id="alarmHour">
              <!-- JS llena -->
            </select>
          </div>
          <span>:</span>
          <div>
            <select id="alarmMinute">
              <!-- JS llena -->
            </select>
          </div>
        </div>

        <div class="digital-display" id="alarmDisplay">08:00</div>
        <div class="alarm-status" id="alarmStatus">⏰ Alarma desactivada</div>

        <div class="btn-group">
          <button class="btn" id="btnAlarmToggle">▶ Activar</button>
        </div>
      </div>

      <!-- =========================================
      PANEL: CRONÓMETRO
      ========================================= -->
      <div class="panel" id="panel-stopwatch">
        <div class="digital-display" id="swDisplay">00:00:00.00</div>

        <div class="btn-group">
          <button class="btn" id="btnSwStart">▶ Iniciar</button>
          <button class="btn" id="btnSwLap" disabled>⏱ Vuelta</button>
          <button class="btn danger" id="btnSwReset" disabled>↺</button>
        </div>

        <div class="laps-container" id="swLaps">
          <div class="laps-empty">Sin vueltas</div>
        </div>
      </div>

      <!-- =========================================
      PANEL: TEMPORIZADOR
      ========================================= -->
      <div class="panel" id="panel-timer">
        <!-- Selectores para configurar -->
        <div class="timer-pickers" id="timerPickers">
          <div>
            <select id="timerHours">
              <!-- JS -->
            </select>
            <span class="lbl">horas</span>
          </div>
          <span class="sep">:</span>
          <div>
            <select id="timerMinutes">
              <!-- JS -->
            </select>
            <span class="lbl">min</span>
          </div>
          <span class="sep">:</span>
          <div>
            <select id="timerSeconds">
              <!-- JS -->
            </select>
            <span class="lbl">seg</span>
          </div>
        </div>

        <div class="digital-display" id="timerDisplay">00:05:00</div>
        <div class="info-line" id="timerStatus">Configura y presiona Iniciar</div>

        <div class="btn-group">
          <button class="btn" id="btnTimerStart">▶ Iniciar</button>
          <button class="btn danger" id="btnTimerReset" disabled>↺ Reset</button>
        </div>
      </div>
    </div>

    <script>
      // ================================================================
      //  SONIDO (Web Audio API - beep)
      // ================================================================
      let audioCtx = null;

      function playBeep(freq = 880, duration = 200, times = 5) {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

          let count = 0;
          function beep() {
            if (count >= times) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration / 1000);
            count++;
            if (count < times) setTimeout(beep, duration * 1.5);
          }
          beep();
        } catch {
          console.warn('No se pudo reproducir el sonido');
        }
      }

      // ================================================================
      //  UTILIDADES
      // ================================================================
      function pad(n, len = 2) {
        return String(n).padStart(len, '0');
      }

      function $(id) {
        return document.getElementById(id);
      }

      // ================================================================
      //  NAVEGACIÓN POR TABS
      // ================================================================
      const tabBtns = document.querySelectorAll('.tab-btn');
      const panels = {
        clock: $('panel-clock'),
        alarm: $('panel-alarm'),
        stopwatch: $('panel-stopwatch'),
        timer: $('panel-timer'),
      };

      let currentTab = 'clock';

      tabBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === currentTab) return;
          currentTab = tab;
          tabBtns.forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          Object.keys(panels).forEach((k) => {
            panels[k].classList.toggle('active', k === tab);
          });
        });
      });

      // ================================================================
      //  COMPARTIDO: TEMA
      // ================================================================
      function loadTheme() {
        try {
          const saved = localStorage.getItem('clockTheme');
          if (saved === 'light') document.body.classList.add('light-mode');
        } catch {}
      }

      function saveTheme() {
        try {
          localStorage.setItem(
            'clockTheme',
            document.body.classList.contains('light-mode') ? 'light' : 'dark'
          );
        } catch {}
      }

      function updateThemeBtn() {
        const isLight = document.body.classList.contains('light-mode');
        $('btnTheme').textContent = isLight ? '☀️ Tema' : '🌙 Tema';
      }

      $('btnTheme').addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        updateThemeBtn();
        saveTheme();
      });

      loadTheme();
      updateThemeBtn();

      // ================================================================
      //  MÓDULO 1: RELOJ
      // ================================================================
      let clock24h = true;
      let clockShowSeconds = true;

      function loadClockPrefs() {
        try {
          const saved = localStorage.getItem('clockPrefs');
          if (saved) {
            const p = JSON.parse(saved);
            if (p.format24 !== undefined) clock24h = p.format24;
            if (p.seconds !== undefined) clockShowSeconds = p.seconds;
          }
        } catch {}
      }

      function saveClockPrefs() {
        try {
          localStorage.setItem(
            'clockPrefs',
            JSON.stringify({ format24: clock24h, seconds: clockShowSeconds })
          );
        } catch {}
      }

      function formatClockTime(date) {
        let hours, suffix;
        if (clock24h) {
          hours = pad(date.getHours());
          suffix = '';
        } else {
          const h = date.getHours();
          suffix = h >= 12 ? ' PM' : ' AM';
          const h12 = h % 12 || 12;
          hours = pad(h12);
        }
        const mins = pad(date.getMinutes());
        const secs = pad(date.getSeconds());

        if (clockShowSeconds) {
          return `${hours}:${mins}<span class="dim">:${secs}</span>${suffix}`;
        }
        return `${hours}:${mins}${suffix}`;
      }

      function getGreeting(h) {
        if (h < 6) return '🌙 Buenas noches';
        if (h < 12) return '☀️ Buenos días';
        if (h < 18) return '🌤️ Buenas tardes';
        return '🌙 Buenas noches';
      }

      function formatDateStr(date) {
        const dias = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
        const meses = [
          'enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
          'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre',
        ];
        return `${dias[date.getDay()]}, ${date.getDate()} de ${meses[date.getMonth()]} de ${date.getFullYear()}`;
      }

      function getTzLabel(date) {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const off = -date.getTimezoneOffset();
        const sign = off >= 0 ? '+' : '';
        const h = Math.floor(Math.abs(off) / 60);
        const m = Math.abs(off) % 60;
        return `UTC${sign}${h}:${pad(m)} · ${tz}`;
      }

      function updateClockDisplay() {
        const now = new Date();
        $('clockDisplay').innerHTML = formatClockTime(now);
        $('clockGreeting').textContent = getGreeting(now.getHours());
        $('clockDate').textContent = formatDateStr(now);
        $('clockTimezone').textContent = getTzLabel(now);
      }

      // Botones reloj
      $('btnFormat24h').addEventListener('click', () => {
        clock24h = !clock24h;
        $('btnFormat24h').classList.toggle('active', clock24h);
        $('btnFormat24h').textContent = clock24h ? '24h' : '12h';
        updateClockDisplay();
        saveClockPrefs();
      });

      $('btnShowSeconds').addEventListener('click', () => {
        clockShowSeconds = !clockShowSeconds;
        $('btnShowSeconds').classList.toggle('active', clockShowSeconds);
        updateClockDisplay();
        saveClockPrefs();
      });

      loadClockPrefs();
      $('btnFormat24h').classList.toggle('active', clock24h);
      $('btnFormat24h').textContent = clock24h ? '24h' : '12h';
      $('btnShowSeconds').classList.toggle('active', clockShowSeconds);

      // Guardamos ref para el intervalo del reloj
      let clockIntervalId = null;

      updateClockDisplay();
      clockIntervalId = setInterval(updateClockDisplay, 1000);

      // ================================================================
      //  MÓDULO 2: ALARMA
      // ================================================================
      // Llenar selects
      const alarmHourSel = $('alarmHour');
      const alarmMinSel = $('alarmMinute');

      for (let i = 0; i < 24; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = pad(i);
        alarmHourSel.appendChild(opt);
      }
      for (let i = 0; i < 60; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = pad(i);
        alarmMinSel.appendChild(opt);
      }

      let alarmActive = false;
      let alarmTriggered = false;
      let alarmHour = 8;
      let alarmMin = 0;

      function updateAlarmDisplay() {
        $('alarmDisplay').textContent = `${pad(alarmHour)}:${pad(alarmMin)}`;
      }

      alarmHourSel.value = alarmHour;
      alarmMinSel.value = alarmMin;
      updateAlarmDisplay();

      alarmHourSel.addEventListener('change', () => {
        alarmHour = parseInt(alarmHourSel.value);
        alarmTriggered = false;
        updateAlarmDisplay();
      });

      alarmMinSel.addEventListener('change', () => {
        alarmMin = parseInt(alarmMinSel.value);
        alarmTriggered = false;
        updateAlarmDisplay();
      });

      function checkAlarm() {
        if (!alarmActive || alarmTriggered) return;
        const now = new Date();
        if (now.getHours() === alarmHour && now.getMinutes() === alarmMin && now.getSeconds() < 2) {
          alarmTriggered = true;
          $('alarmStatus').textContent = '🔔 ¡ALARMA! 🔔';
          $('alarmStatus').classList.add('active-alarm');
          $('alarmDisplay').classList.add('flash');
          playBeep(880, 200, 8);

          // Parpadeo visual
          let flashCount = 0;
          const flashInterval = setInterval(() => {
            $('alarmDisplay').classList.toggle('flash');
            flashCount++;
            if (flashCount > 14) {
              clearInterval(flashInterval);
              $('alarmDisplay').classList.remove('flash');
              $('alarmStatus').textContent = '⏰ Alarma desactivada';
              $('alarmStatus').classList.remove('active-alarm');
              alarmActive = false;
              $('btnAlarmToggle').textContent = '▶ Activar';
              $('btnAlarmToggle').classList.remove('active');
            }
          }, 400);
        }
      }

      $('btnAlarmToggle').addEventListener('click', () => {
        alarmActive = !alarmActive;
        if (alarmActive) {
          alarmTriggered = false;
          $('btnAlarmToggle').textContent = '⏹ Desactivar';
          $('btnAlarmToggle').classList.add('active');
          $('alarmStatus').textContent = `🔔 Activada a las ${pad(alarmHour)}:${pad(alarmMin)}`;
          $('alarmStatus').classList.remove('active-alarm');
          $('alarmDisplay').classList.remove('flash');
        } else {
          $('btnAlarmToggle').textContent = '▶ Activar';
          $('btnAlarmToggle').classList.remove('active');
          $('alarmStatus').textContent = '⏰ Alarma desactivada';
          $('alarmStatus').classList.remove('active-alarm');
          $('alarmDisplay').classList.remove('flash');
        }
      });

      // Revisar alarma cada segundo (se ejecuta junto al setInterval del reloj)

      // ================================================================
      //  MÓDULO 3: CRONÓMETRO
      // ================================================================
      let swRunning = false;
      let swStartTime = 0;
      let swElapsed = 0;
      let swInterval = null;
      let swLaps = [];

      function formatSwTime(ms) {
        const totalCs = Math.floor(ms / 10);
        const cs = totalCs % 100;
        const totalSec = Math.floor(totalCs / 100);
        const sec = totalSec % 60;
        const min = Math.floor(totalSec / 60) % 60;
        const hrs = Math.floor(totalSec / 3600);
        return `${pad(hrs)}:${pad(min)}:${pad(sec)}.<span class="dim">${pad(cs)}</span>`;
      }

      function updateSwDisplay() {
        const now = swRunning ? Date.now() - swStartTime + swElapsed : swElapsed;
        $('swDisplay').innerHTML = formatSwTime(now);
      }

      function renderSwLaps() {
        const container = $('swLaps');
        container.innerHTML = '';
        if (swLaps.length === 0) {
          container.innerHTML = '<div class="laps-empty">Sin vueltas</div>';
          return;
        }
        swLaps.forEach((lap, i) => {
          const div = document.createElement('div');
          div.className = 'lap-item';
          div.innerHTML = `<span>Vuelta ${i + 1}</span><span>${formatSwTime(lap)}</span>`;
          container.appendChild(div);
        });
      }

      $('btnSwStart').addEventListener('click', () => {
        if (!swRunning) {
          swRunning = true;
          swStartTime = Date.now();
          $('btnSwStart').textContent = '⏸ Pausar';
          $('btnSwStart').classList.add('active');
          $('btnSwLap').disabled = false;
          $('btnSwReset').disabled = false;
          swInterval = setInterval(updateSwDisplay, 20);
        } else {
          swRunning = false;
          swElapsed += Date.now() - swStartTime;
          clearInterval(swInterval);
          $('btnSwStart').textContent = '▶ Reanudar';
          $('btnSwStart').classList.remove('active');
          $('btnSwLap').disabled = true;
          updateSwDisplay();
        }
      });

      $('btnSwLap').addEventListener('click', () => {
        if (!swRunning) return;
        const lapTime = Date.now() - swStartTime + swElapsed;
        // Restar vueltas anteriores para tiempo de vuelta?
        const prevTotal = swLaps.reduce((a, b) => a + b, 0);
        swLaps.push(lapTime - prevTotal);
        renderSwLaps();
      });

      $('btnSwReset').addEventListener('click', () => {
        swRunning = false;
        clearInterval(swInterval);
        swElapsed = 0;
        swLaps = [];
        $('btnSwStart').textContent = '▶ Iniciar';
        $('btnSwStart').classList.remove('active');
        $('btnSwLap').disabled = true;
        $('btnSwReset').disabled = true;
        updateSwDisplay();
        renderSwLaps();
      });

      // ================================================================
      //  MÓDULO 4: TEMPORIZADOR
      // ================================================================
      // Llenar selects
      const selH = $('timerHours');
      const selM = $('timerMinutes');
      const selS = $('timerSeconds');

      for (let i = 0; i <= 23; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = pad(i);
        selH.appendChild(opt);
      }
      for (let i = 0; i <= 59; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = pad(i);
        selM.appendChild(opt);
        const opt2 = document.createElement('option');
        opt2.value = i;
        opt2.textContent = pad(i);
        selS.appendChild(opt2);
      }

      selH.value = 0;
      selM.value = 5;
      selS.value = 0;

      let timerRunning = false;
      let timerPaused = false;
      let timerRemaining = 5 * 60 * 1000; // 5 min default
      let timerInterval = null;
      let timerEndTime = 0;

      function formatTimerTime(ms) {
        if (ms < 0) ms = 0;
        const totalSec = Math.ceil(ms / 1000);
        const sec = totalSec % 60;
        const min = Math.floor(totalSec / 60) % 60;
        const hrs = Math.floor(totalSec / 3600);
        return `${pad(hrs)}:${pad(min)}:${pad(sec)}`;
      }

      function updateTimerDisplay() {
        $('timerDisplay').textContent = formatTimerTime(timerRemaining);
      }

      function getTimerFromSelectors() {
        return (
          parseInt(selH.value) * 3600000 +
          parseInt(selM.value) * 60000 +
          parseInt(selS.value) * 1000
        );
      }

      function timerTick() {
        const now = Date.now();
        timerRemaining = timerEndTime - now;
        if (timerRemaining <= 0) {
          timerRemaining = 0;
          updateTimerDisplay();
          // Timer terminado
          clearInterval(timerInterval);
          timerRunning = false;
          timerPaused = false;
          $('timerDisplay').classList.add('flash');
          $('timerStatus').textContent = '⏰ ¡TIEMPO! ⏰';
          $('btnTimerStart').textContent = '▶ Iniciar';
          $('btnTimerStart').classList.remove('active');
          $('btnTimerReset').disabled = false;
          $('timerPickers').style.display = 'flex';
          playBeep(660, 250, 6);

          // Parpadeo
          let fc = 0;
          const fi = setInterval(() => {
            $('timerDisplay').classList.toggle('flash');
            fc++;
            if (fc > 12) {
              clearInterval(fi);
              $('timerDisplay').classList.remove('flash');
            }
          }, 400);
          return;
        }
        updateTimerDisplay();
      }

      $('btnTimerStart').addEventListener('click', () => {
        if (!timerRunning && !timerPaused) {
          // Iniciar desde cero
          timerRemaining = getTimerFromSelectors();
          if (timerRemaining <= 0) {
            $('timerStatus').textContent = '⚠️ Pon un tiempo mayor a 0';
            return;
          }
          timerRunning = true;
          timerEndTime = Date.now() + timerRemaining;
          $('timerPickers').style.display = 'none';
          $('timerDisplay').classList.remove('flash');
          $('btnTimerStart').textContent = '⏸ Pausar';
          $('btnTimerStart').classList.add('active');
          $('btnTimerReset').disabled = true;
          $('timerStatus').textContent = '⏳ Contando...';
          timerInterval = setInterval(timerTick, 100);
        } else if (timerRunning && !timerPaused) {
          // Pausar
          clearInterval(timerInterval);
          timerRunning = false;
          timerPaused = true;
          timerRemaining = timerEndTime - Date.now();
          $('btnTimerStart').textContent = '▶ Reanudar';
          $('btnTimerStart').classList.remove('active');
          $('btnTimerReset').disabled = false;
          $('timerStatus').textContent = '⏸ Pausado';
        } else if (!timerRunning && timerPaused) {
          // Reanudar
          timerRunning = true;
          timerPaused = false;
          timerEndTime = Date.now() + timerRemaining;
          $('btnTimerStart').textContent = '⏸ Pausar';
          $('btnTimerStart').classList.add('active');
          $('btnTimerReset').disabled = true;
          $('timerStatus').textContent = '⏳ Contando...';
          timerInterval = setInterval(timerTick, 100);
        }
      });

      $('btnTimerReset').addEventListener('click', () => {
        clearInterval(timerInterval);
        timerRunning = false;
        timerPaused = false;
        timerRemaining = getTimerFromSelectors();
        $('timerPickers').style.display = 'flex';
        $('timerDisplay').classList.remove('flash');
        $('btnTimerStart').textContent = '▶ Iniciar';
        $('btnTimerStart').classList.remove('active');
        $('btnTimerReset').disabled = true;
        $('timerStatus').textContent = 'Configura y presiona Iniciar';
        updateTimerDisplay();
      });

      // Sincronizar display
      selH.addEventListener('change', () => {
        if (!timerRunning && !timerPaused) {
          timerRemaining = getTimerFromSelectors();
          updateTimerDisplay();
        }
      });
      selM.addEventListener('change', () => {
        if (!timerRunning && !timerPaused) {
          timerRemaining = getTimerFromSelectors();
          updateTimerDisplay();
        }
      });
      selS.addEventListener('change', () => {
        if (!timerRunning && !timerPaused) {
          timerRemaining = getTimerFromSelectors();
          updateTimerDisplay();
        }
      });

      updateTimerDisplay();

      // ================================================================
      //  CHECK DE ALARMA (integrado en el tick del reloj)
      // ================================================================
      // Removemos el intervalo anterior y creamos uno nuevo que incluya checkAlarm
      clearInterval(clockIntervalId);

      const combinedTick = function () {
        updateClockDisplay();
        checkAlarm();
      };

      // Ejecutamos inmediatamente y arrancamos el intervalo combinado
      combinedTick();
      clockIntervalId = setInterval(combinedTick, 1000);
    </script>
  </body>
</html>
